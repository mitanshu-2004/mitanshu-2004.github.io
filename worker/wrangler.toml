name = "mitanshu-chat"
main = "src/chat.js"
compatibility_date = "2025-06-01"

# ALLOWED_ORIGINS is a plain var (not secret). Add your workers.dev preview origin
# here too if you test against it before the custom domain is live.
[vars]
ALLOWED_ORIGINS = "https://mitanshu.dev,https://www.mitanshu.dev"

# Visitor analytics store (one row per pageview; written by POST /collect).
[[d1_databases]]
binding = "ANALYTICS_DB"
database_name = "mitanshu-analytics"
database_id = "da1ce0fa-1fff-419d-8f6c-f224e962d24a"

# GROQ_API_KEYS is a SECRET — never put it here. Set it once with:
#   cd worker && npx wrangler secret put GROQ_API_KEYS
# then paste the comma-joined keys when prompted.

# Per-IP rate limit (Cloudflare Rate Limiting binding, free). Caps abuse of the
# Groq keys regardless of a spoofed Origin. 20 requests / 60s per IP.
[[unsafe.bindings]]
name = "CHAT_RATE_LIMIT"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 20, period = 60 }
